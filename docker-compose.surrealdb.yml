# ─── OASIS Sleek — SurrealDB container (local dev + integration tests) ───
#
# Usage:
#   docker compose -f docker-compose.surrealdb.yml up -d
#   # or via the helper scripts:
#   pwsh scripts/surrealdb/start-test-container.ps1
#   pwsh scripts/surrealdb/stop-test-container.ps1
#
# Design decisions:
#   - Port 8442 (avoids collisions: oasis-postgres is on 5441, native PG on 5432)
#   - SurrealKV backend (--kvs surrealkv) — native embedded store, no Tikv/Fdb dep
#   - SURREAL_SYNC_DATA=true  → G1 durability: each commit is fsynced before ack
#   - Single root credential for local dev (NOT for production)
#   - Named volume preserves data across container restarts (persistent, not ephemeral)
#
# CI note: for ephemeral CI runs, override the volume with tmpfs or simply
# omit the volume bind — the container still starts correctly; data is lost
# on removal which is desirable in CI.
#
# SurrealDB HTTP health endpoint: GET http://localhost:8442/health → 200 OK
# WebSocket / SDK endpoint:       ws://localhost:8442/rpc
#

services:
  surrealdb:
    # NOTE: SurrealDb.Net SDK 0.10.2 (Apr 2024) targets SurrealDB server 1.x protocol.
    # v1.5.4 is the most recent stable 1.x release compatible with this SDK version.
    # Upgrade both the server image AND the SDK pin together (G4).
    image: surrealdb/surrealdb:v1.5.4
    container_name: oasis-surrealdb
    restart: unless-stopped
    command:
      - start
      - --log
      - info
      - --user
      - root
      - --pass
      - oasis-surreal-root
      - --bind
      - 0.0.0.0:8442
      - surrealkv://data/oasis.db?sync=every
    environment:
      # G1 — durability: flush to disk before acknowledging each write commit.
      # In SurrealDB 1.x, the canonical mechanism is the ?sync=every URI parameter.
      # SURREAL_SYNC_DATA and SURREAL_KV_ROCKSDB_SYNC env vars are kept for
      # belt-and-suspenders redundancy but the URI parameter is authoritative.
      SURREAL_SYNC_DATA: "true"
      SURREAL_KV_ROCKSDB_SYNC: "true"
    ports:
      - "8442:8442"
    volumes:
      - surrealdb_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8442/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  surrealdb_data:
    driver: local
