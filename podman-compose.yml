# ─── OASIS Sleek — Full Stack Compose (Podman) ───
#
# Usage:
#   podman-compose -f podman-compose.yml up --build
#
# Services:
#   - surrealdb:   SurrealDB 1.5.4 (port 8442) — sole storage backend
#   - oasis-api:   .NET 8 WebAPI (port 5000)
#   - oasis-web:   Next.js frontend (port 3000)
#
# Access:
#   Frontend:  http://localhost:3000
#   API:       http://localhost:5000
#   Swagger:   http://localhost:5000/swagger
#
# Storage: SurrealDB only. Postgres + EF Core were deleted in
# `surrealdb-migration` CLOSEOUT Stream D (2026-05-22); the `oasis-postgres`
# service + `ConnectionStrings__OASISDatabase` + `OASIS__DefaultProvider` env
# vars have been removed. See `docker-compose.surrealdb.yml` for the standalone
# dev/test container variant.
#

services:
  # ─── SurrealDB (sole storage backend) ───
  # Mirrors docker-compose.surrealdb.yml — same image, same G1 durability
  # parameters (sync=every on the storage URI). Port 8442 matches the standalone
  # dev container so dev tooling + scripts work either way.
  surrealdb:
    image: surrealdb/surrealdb:v1.5.4
    container_name: oasis-surrealdb
    restart: unless-stopped
    command:
      - start
      - --log
      - info
      - --user
      - root
      - --pass
      - oasis-surreal-root
      - --bind
      - 0.0.0.0:8442
      - surrealkv://data/oasis.db?sync=every
    environment:
      # G1 — durability: flush to disk before acknowledging each write commit.
      SURREAL_SYNC_DATA: "true"
      SURREAL_KV_ROCKSDB_SYNC: "true"
    ports:
      - "8442:8442"
    volumes:
      - surrealdb_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8442/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  # ─── .NET WebAPI ───
  oasis-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oasis-api
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      # SurrealDB connection (matches docker-compose.surrealdb.yml). The
      # SurrealDb section is bound by builder.Services.AddOasisSurrealDb(...)
      # in Program.cs. G1DurabilityAcknowledged must be true — operators
      # acknowledge the compose file has sync=every on the storage URI.
      SurrealDb__Endpoint: "http://surrealdb:8442"
      SurrealDb__Namespace: "oasis"
      SurrealDb__Database: "oasis"
      SurrealDb__User: "root"
      SurrealDb__Password: "oasis-surreal-root"
      SurrealDb__G1DurabilityAcknowledged: "true"
      Jwt__Key: "super-secret-key-for-testing-only-must-be-32-chars!"
      Jwt__Issuer: "oasis-sleek"
      Jwt__Audience: "oasis-sleek"
      # Blockchain RPC (testnet/devnet — safe for functional testing)
      Blockchain__Chains__Algorand__DefaultNetwork: "testnet"
      Blockchain__Chains__Algorand__Networks__testnet__NodeUrl: "https://testnet-algod.algonode.cloud"
      Blockchain__Chains__Algorand__Networks__testnet__IndexerUrl: "https://testnet-idx.algonode.cloud"
      Blockchain__Chains__Solana__DefaultNetwork: "devnet"
      Blockchain__Chains__Solana__Networks__devnet__NodeUrl: "https://api.devnet.solana.com"
    depends_on:
      surrealdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/swagger/index.html || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ─── Next.js Frontend ───
  oasis-web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: oasis-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NODE_ENV: production
    depends_on:
      oasis-api:
        condition: service_healthy

volumes:
  surrealdb_data:
